<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Fontaine Bros. | Asset Manager{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- ── Header ───────────────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ url_for('index') }}" class="brand">
        <img src="{{ url_for('static', filename='fb-logo.svg') }}"
             class="brand-logo" alt="Fontaine Bros." />
        <span class="brand-sub">Digital Asset Manager</span>
      </a>

      <nav class="header-nav">
        <a href="{{ url_for('index') }}"
           class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
          All Projects
        </a>
        <a href="{{ url_for('map_view') }}"
           class="nav-link {% if request.endpoint == 'map_view' %}active{% endif %}">
          🗺 Map
        </a>
        <a href="{{ url_for('employees_list') }}"
           class="nav-link {% if request.endpoint in ['employees_list','employee_detail'] %}active{% endif %}">
          👥 Team
        </a>
        <button class="nav-link nav-new-btn" onclick="openNewProjectModal()">
          + New Project
        </button>
        <a href="{{ url_for('logout') }}" class="nav-link nav-logout" title="Sign out">
          Sign Out
        </a>
      </nav>
    </div>
  </header>

  <!-- ── Main ─────────────────────────────────────────────────── -->
  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <!-- ── New Project Modal ────────────────────────────────────── -->
  <div id="newProjectModal" class="modal-backdrop" onclick="closeNewProjectModal(event)">
    <div class="modal" role="dialog">
      <h2 class="modal-title">New Project</h2>
      <p class="modal-desc">Enter a name for the new project to get started.</p>
      <div class="modal-field">
        <label for="newProjectName">Project Name</label>
        <input type="text" id="newProjectName"
               placeholder="e.g. Central High School Renovation"
               onkeydown="if(event.key==='Enter') submitNewProject()" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="submitNewProject()">Create Project →</button>
        <button class="btn btn-ghost"   onclick="closeNewProjectModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ────────────────────────────────────────────────── -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
