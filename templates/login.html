<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | Fontaine Bros. Asset Manager</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-brand">
      <svg class="login-brand-icon" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="8" fill="#2563eb"/>
        <path d="M8 30 L20 12 L32 30" stroke="white" stroke-width="3" stroke-linejoin="round" fill="none"/>
        <rect x="14" y="20" width="12" height="10" rx="1" fill="white"/>
        <rect x="17" y="24" width="3" height="6" fill="#2563eb"/>
        <rect x="20" y="24" width="3" height="6" fill="#2563eb"/>
      </svg>
      <div>
        <div class="login-brand-name">Fontaine Bros.</div>
        <div class="login-brand-sub">Digital Asset Manager</div>
      </div>
    </div>

    <h1 class="login-title">Team Sign In</h1>
    <p class="login-desc">Enter your team password to access the project portfolio.</p>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="login-error">{{ messages[0] }}</div>
    {% endif %}
    {% endwith %}

    <form method="post" class="login-form">
      <div class="login-field">
        <label for="password">Team Password</label>
        <input type="password" id="password" name="password"
               placeholder="Enter team password"
               autofocus autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary login-btn">Sign In →</button>
    </form>
  </div>

</body>
</html>
